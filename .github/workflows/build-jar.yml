name: Build jar

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'plugin.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch:  # 手动触发

jobs:
  build-plugin-jar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Get commit hash
        id: commit
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          
      - name: Build with Maven
        run: mvn clean package
        
      - name: Get JAR file name
        id: jar-name
        run: |
          JAR_FILE=$(find target -name "server.jar" -type f | head -1)
          echo "jar_file=$JAR_FILE" >> $GITHUB_OUTPUT
          echo "Found JAR file: $JAR_FILE"
          
      - name: Create Latest Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: java-ws
          body: |
            ## Info
            Java serverless build vless/trojan/shadowsocks on java server,no need core.
            Download the JAR file below and place it in your server's root directory.
            You can customize the .env file and place it in the root directory.
            
          files: ${{ steps.jar-name.outputs.jar_file }}
          make_latest: true
          overwrite: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: javaws-latest-build
          path: ${{ steps.jar-name.outputs.jar_file }}
          retention-days: 30
